BaseUrl = "https://blog.jonathanoliver.com/"
LanguageCode = "en-US"
Title = "Jonathan Oliver"
paginate = 5
#DisqusShortname = "YOUR_SHORT_NAME_HERE"
Copyright = "(c) Jonathan Oliver. All rights reserved."
canonifyurls = true
theme = "casper"

[permaLinks] 
	post = "/:slug"

[params]
	description = "Eventually Consistent, Fully Distributed"
	#metadescription = "Used as 'description' meta tag for both home and index pages. If not set, 'description' will be used instead"
	cover = "images/cover.jpg"
	author = "Jonathan Oliver"
	authorlocation = "USA"
	authorwebsite = "https://blog.jonathanoliver.com"
	#authorbio = ""
	#logo = "images/logo.png"
	#googleAnalyticsUserID = "UA-79101-12"
	# Optional RSS-Link, if not provided it defaults to the standard index.xml
	#RSSLink = "http://feeds.feedburner.com/..."
	#githubName = "joliver"
	twitterName = "jonathan_oliver"
	# facebookName = ""
	# linkedinName = ""
	# set true if you are not proud of using Hugo (true will hide the footer note "Proudly published with HUGO.....")
	#hideHUGOSupport = false
	
	# Setting a value will load highlight.js and enable syntax highlighting using the style selected.
	# See https://github.com/isagalaev/highlight.js/tree/master/src/styles for available styles
	# A preview of above styles can be viewed at https://highlightjs.org/static/demo/
	hjsStyle = "default"

	[params.social]
		twitter = "jonathan_oliver"
